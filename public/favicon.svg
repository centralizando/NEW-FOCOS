<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Cream Background with Bold Border -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="#F9F8F3" stroke="#1A1A1A" stroke-width="24"/>
  
  <!-- Outer Focus Ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#1A1A1A" stroke-width="24" stroke-dasharray="32 20"/>
  
  <!-- Inner Focus Ring -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="#1A1A1A" stroke-width="16"/>
  
  <!-- Vibrant Orange Focus Dot -->
  <circle cx="256" cy="256" r="40" fill="#EA580C" stroke="#1A1A1A" stroke-width="12"/>
</svg>
